services:
  nginx:
    image: nginx:latest
    ports:
      - 80:80
    restart: always
    volumes:
      # nginx配置文件
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/ssl:/etc/nginx/ssl
      - ./www:/var/www/
    networks:
      - backend
    environment:
      - TZ=Asia/Shanghai
    links:
      - php84
    ulimits:
      nofile:
        soft: 65535
        hard: 65535

  php84:
    build:
      context: ./php84
    container_name: php84
    restart: always
    volumes:
      # php 配置文件
      - ./php84/etc/php.ini:/usr/local/etc/php/php.ini:ro
      - ./php84/etc/conf.d/docker-php-ext-opcache.ini:/usr/local/etc/php/conf.d/docker-php-ext-opcache.ini:ro
      - ./php84/etc/php-fpm.d:/usr/local/etc/php-fpm.d:ro
      # 项目代码
      - ./www:/var/www/
    networks:
      - backend
    environment:
      - TZ=Asia/Shanghai
    links:
      - mysql
      - redis
    ulimits:
      nofile:
        soft: 65535
        hard: 65535
    
  mysql:
    image: mysql:latest
    environment:
      - MYSQL_ROOT_PASSWORD=root_password
      - TZ=Asia/Shanghai
    volumes:
      # 数据文件
      - ./mysql/data:/var/lib/mysql
    command: --default-authentication-plugin=mysql_native_password
    restart: always   
    networks:
      - backend
    ulimits:
      nofile:
        soft: 65535
        hard: 65535

  redis:
    image: redis:latest
    restart: always
    networks:
      - backend
    environment:
      - TZ=Asia/Shanghai
    volumes:
      - ./redis1/data:/data
    command: ["redis-server", "--save", "60", "1", "--dir", "/data"]
    ulimits:
      nofile:
        soft: 65535
        hard: 65535


networks:
  backend: